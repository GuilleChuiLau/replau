# Replau local ops reverse proxy for Apache.
# Install into /etc/apache2/conf-available/replau-ops-proxy.conf and enable with a2enconf.

ProxyPreserveHost On
ProxyRequests Off

RequestHeader set X-Forwarded-Proto "http"
RequestHeader set X-Forwarded-Host "%{HTTP_HOST}s"

# Nice landing page.
RedirectMatch 302 ^/$ /dashboard

# Logistics viewer: dashboard, picking, delivery, public order, tracking, status posts.
ProxyPass        /dashboard http://127.0.0.1:8790/dashboard
ProxyPassReverse /dashboard http://127.0.0.1:8790/dashboard

ProxyPass        /ops/ http://127.0.0.1:8790/ops/
ProxyPassReverse /ops/ http://127.0.0.1:8790/ops/

RedirectMatch 302 ^/picking/?$ /ops/picking
RedirectMatch 302 ^/delivery/?$ /ops/delivery

ProxyPass        /order/ http://127.0.0.1:8790/order/
ProxyPassReverse /order/ http://127.0.0.1:8790/order/

ProxyPass        /track/ http://127.0.0.1:8790/track/
ProxyPassReverse /track/ http://127.0.0.1:8790/track/

ProxyPass        /api/order/ http://127.0.0.1:8790/api/order/
ProxyPassReverse /api/order/ http://127.0.0.1:8790/api/order/

ProxyPass        /blocked/ http://127.0.0.1:8790/blocked/
ProxyPassReverse /blocked/ http://127.0.0.1:8790/blocked/

ProxyPass        /email-log/ http://127.0.0.1:8790/email-log/
ProxyPassReverse /email-log/ http://127.0.0.1:8790/email-log/

ProxyPass        /email-logs/ http://127.0.0.1:8790/email-logs/
ProxyPassReverse /email-logs/ http://127.0.0.1:8790/email-logs/

# Kitchen UI under /kitchen/. The app reads X-Forwarded-Prefix and emits /kitchen links.
RedirectMatch 302 ^/kitchen$ /kitchen/
<Location /kitchen/>
    RequestHeader set X-Forwarded-Prefix "/kitchen"
</Location>
ProxyPass        /kitchen/ http://127.0.0.1:8791/
ProxyPassReverse /kitchen/ http://127.0.0.1:8791/
